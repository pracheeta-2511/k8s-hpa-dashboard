apiVersion: apps/v1
kind: Deployment
metadata:
  name: load-generator
  namespace: default
  labels:
    app: load-generator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: load-generator
  template:
    metadata:
      labels:
        app: load-generator
    spec:
      containers:
      - name: load
        image: busybox
        command: ["/bin/sh", "-c"]
        args:
        - |
          echo "Starting load against http://webapp-service/"
          while true; do
            wget -q -O- http://webapp-service/ 2>/dev/null
          done
        resources:
          requests:
            cpu: "50m"
            memory: "32Mi"
          limits:
            cpu: "200m"
            memory: "64Mi"
